<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/cadastro_unidade.css">
</head>

<body>
    <header>
        <div class="nav">
            <a href="./index.html" style="font-weight: bold;">Home</a>
            <a href="./cadastro_unidade.html">Cadastro de Unidade</a>
            <a href="./cadastro_servidor.html">Cadastro de Servidor</a>
        </div>
        <div class="nav2">
            <p> Olá, <span id="nome_usuario"></span>!</p>
            <p>|</p>
            <a href="perfil.html">Perfil</a>
        </div>
    </header>

    <div class="login">
        <div class="cadastro">
            <h2>CADASTRO DO SERVIDOR</h2>
            <div class="formulario">

                <div class="campo">
                    <span>Fornecedor<span style="color: red;">*</span></span>
                    <input id="fornecedor_input" type="text" />
                </div>
                <div class="campo">
                    <span>Modelo<span style="color: red;">*</span></span>
                    <input id="modelo_input" type="text" />
                </div>
                <div class="campo">
                    <span>Numero de série</span>
                    <input id="numero_input" type="number" />
                </div>
                 <div class="campo">
                    <span>Status do servidor</span>
                    <input id="status_input" type="text" />
                </div>
                <button class="botao" onclick="cadastrar()">CADASTRAR UNIDADE</button>
            </div>
            <div id="div_erros_login"></div>
        </div>

        <div class="effect-text"> </div>

    </div>

    <div id="modal_container" class="modal-container">
        <div class="modal-content">
            <h3 id="modal_titulo">Alerta</h3>
            <p id="modal_mensagem"></p>
            <button onclick="fecharModal()" class="botao">OK</button>
        </div>
    </div>


</body>

</html>

<script>
    nome_usuario.innerHTML = `${sessionStorage.NOME_USUARIO}`
    function mostrarModal(titulo, mensagem) {
        modal_titulo.innerHTML = titulo;
        modal_mensagem.innerHTML = mensagem;
        modal_container.style.display = "flex";
    }
    
    function fecharModal() {
        modal_container.style.display = "none";
    }
    
    function cadastrar() {

var fornecedor = fornecedor_input.value;
var modelo = modelo_input.value;
var numero = numero_input.value;
var status = status_input.value;

if(fornecedor == ""||
modelo == ""||
numero == ""||
status == ""
){
    console.log("Prencha todo o formulário")
}else{
        
            fetch("servidores/cadastrar_servidor",{
                method: "POST",
                headers:{
                    "Content-Type": "application/json",
                }, body: JSON.stringify({
                fornecedorServer: fornecedor,
                modeloServer: modelo,
                numeroServer: numero,
                statusServer: status
                })
            })      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
            console.log("Cadastro_unidade realizado com sucesso! Redirecionando para tela de Login...")
            
            const mensagemSuporte = "Unidade Cadastrada com Sucesso!";
            
            mostrarModal("Atenção: Unidade Nova", mensagemSuporte);
            
            setTimeout(() => {
            window.location = "perfil.html";
          }, "2000");

        } else {
            throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
    });
}
}
</script>
