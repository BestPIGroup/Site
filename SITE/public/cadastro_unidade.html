<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/cadastro_unidade.css">
</head>

<body>
    <header>
        <div class="nav">
            <a href="./index_usuario.html" style="font-weight: bold;">Home</a>
            <a href="./cadastro_unidade.html">Cadastro de Unidade</a>
            <a href="./index_usuario.html">Cadastro de Servidor</a>
        </div>
        <div class="nav2">
            <p> Olá, nome do usuario</p>
            <p>|</p>
            <a href="perfil.html">Perfil</a>
        </div>
    </header>

    <div class="login">
        <div class="cadastro">
            <h2>CADASTRO DE UNIDADE</h2>
            <div class="formulario">

                <div class="campo">
                    <span>Código da Unidade <span style="color: red;">*</span></span>
                    <input id="codigo_input" type="text" />
                </div>
                <div class="campo">
                    <span>CEP<span style="color: red;">*</span></span>
                    <input id="cep_input" type="text" />
                </div>
                <div class="campo">
                    <span>Cidade</span>
                    <input id="cidade_input" type="text" />
                </div>
                <div class="campo">
                    <span>Rua</span>
                    <input id="rua_input" type="text" />
                </div>
                <div class="campo">
                    <span>Bairro<span style="color: red;">*</span></span>
                    <input id="bairro_input" type="text" />
                </div>
                <button class="botao" onclick="cadastrar()">CADASTRAR UNIDADE</button>
            </div>
            <div id="div_erros_login"></div>
        </div>

        <div class="effect-text"> </div>

    </div>

    <div id="modal_container" class="modal-container">
        <div class="modal-content">
            <h3 id="modal_titulo">Alerta</h3>
            <p id="modal_mensagem"></p>
            <button onclick="fecharModal()" class="botao">OK</button>
        </div>
    </div>


</body>

</html>

<script>
    function cadastrar() {


        const mensagemSuporte = "Unidade Cadastrada com Sucesso!";

        mostrarModal("Atenção: Unidade Nova", mensagemSuporte);


    }

    function mostrarModal(titulo, mensagem) {
        modal_titulo.innerHTML = titulo;
        modal_mensagem.innerHTML = mensagem;
        modal_container.style.display = "flex";
    }

    function fecharModal() {
        modal_container.style.display = "none";
    }
</script>
