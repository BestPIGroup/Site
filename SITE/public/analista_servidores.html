<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1e33;
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 90px;
    height: 100vh;
    background: linear-gradient(180deg, #081626, #0b1e33);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    padding: 20px 10px;
    transition: 0.3s;
}

/* LOGO */
.logo {
    width: 40px;
    height: 40px;
    background: #102b52;
    border-radius: 10px;
}

/* MENU */
.menu {
    display: flex;
    flex-direction: column;
    gap: 25px;
    width: 100%;
}

.item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
    border-radius: 12px;
    cursor: pointer;
    opacity: 0.6;
}

.item:hover, .item.active {
    opacity: 1;
    background: #102b52;
}

.icon {
    width: 25px;
    height: 25px;
    background: #1f3d6b;
    border-radius: 6px;
}

.item p {
    font-size: 11px;
    margin: 5px 0 0;
}

/* BOTTOM */
.bottom {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

/* USER */
.user {
    text-align: center;
    font-size: 12px;
}

/* BOTÃO SAIR */
.logout {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 12px;
    opacity: 0.6;
    cursor: pointer;
    transition: 0.3s;
}

.logout:hover {
    opacity: 1;
}

/* MAIN */
.container {
    flex: 1;
    padding: 20px;
}

/* KPIs */
.kpis {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    margin-bottom: 20px;
}

.kpi {
    background: #102b52;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    display: flex;
    align-items: center;
    img {
        width: 40px;
        height: 40px;
        margin-right: 5px;
    }
}

/* SERVERS */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
}

.card {
    background: #102b52;
    padding: 20px;
    border-radius: 12px;
}

.header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

.ok { color: #00ff88; }
.warn { color: #ffd166; }
.crit { color: #ff4d4d; }

.sec-ok { color: #00ff88; }
.sec-bad { color: #ff4d4d; }

.metric {
    margin: 8px 0;
}

.bar {
    height: 6px;
    background: #1f3d6b;
    border-radius: 10px;
}

.fill {
    height: 100%;
    border-radius: 10px;
}

.cpu { background: #4dabf7; }
.ram { background: #9775fa; }
.disk { background: #ffa94d; }
.net { background: #00ff88; }

.process {
    margin-top: 10px;
    font-weight: bold;
}

/* MOBILE */
.menu-btn {
    display: none;
    position: fixed;
    top: 10px;
    left: 10px;
    background: #102b52;
    border: none;
    color: white;
    padding: 10px;
    border-radius: 8px;
    z-index: 1001;
}

@media (max-width: 768px) {
    .menu-btn { display: block; }

    .sidebar {
        position: fixed;
        left: -100px;
        top: 0;
        z-index: 1000;
    }

    .sidebar.active {
        left: 0;
    }
}
</style>
</head>

<body>

<button class="menu-btn" onclick="toggleSidebar()">☰</button>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

    <div class="logo"></div>

    <div class="menu">
        <div class="item active">
            <div class="icon"></div>
            <p>Servidores</p>
        </div>

        <div class="item">
            <div class="icon"></div>
            <p>Alertas</p>
        </div>

        <div class="item">
            <div class="icon"></div>
            <p>Config</p>
        </div>
    </div>

<div class="bottom">
    <div class="user">
        👤
        <strong>Marcio Lima</strong>
        <span>Analista</span>
    </div>

    <!-- BOTÃO SAIR -->
    <div class="logout">
        <div class="icon"></div>
        <p>Sair</p>
    </div>
</div>

</div>

<!-- MAIN -->
<div class="container">

    <div class="kpis">
        <div class="kpi">
            Total de Servidores<h2 id="total"></h2>
        </div>
        <div class="kpi">
            <img src="./assets/green_check.png" alt="">
            Servidores Normais<h2 id="ok"></h2>
        </div>
        <div class="kpi">
            <img src="./assets/yellow_exclamation.png" alt="">
            Servidores em Atenção<h2 id="warn"></h2>
        </div>
        <div class="kpi">
            <img src="./assets/red_warning.png" alt="">
            Servidores Críticos<h2 id="crit"></h2>
        </div>
        <div class="kpi">
            Alertas de Hardware<h2 id="alert"></h2>
        </div>
        <div class="kpi">
            Ciberameaças Detectadas<h2 id="threats"></h2>
        </div>
    </div>

    <div class="grid" id="servers"></div>

</div>

<script>
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("active");
}

const data = [
    {nome:"Servidor 1", status:"ok", cpu:45, ram:68, disk:72, net:120, processos:128, alertas:0, seguranca:"ok", ameacas:0},
    {nome:"Servidor 2", status:"crit", cpu:90, ram:85, disk:95, net:320, processos:342, alertas:3, seguranca:"bad", ameacas:5},
    {nome:"Servidor 3", status:"warn", cpu:60, ram:70, disk:65, net:180, processos:215, alertas:1, seguranca:"bad", ameacas:2},
    {nome:"Servidor 4", status:"ok", cpu:35, ram:50, disk:40, net:90, processos:98, alertas:0, seguranca:"ok", ameacas:0}
];

let ok=0, warn=0, crit=0, alert=0, threats=0;

data.forEach(s=>{
    if(s.status==="ok") ok++;
    if(s.status==="warn") warn++;
    if(s.status==="crit") crit++;
    alert += s.alertas;
    threats += s.ameacas;

    const card = document.createElement("div");
    card.className="card";

    card.innerHTML=`
    <div class="header">
        <strong>${s.nome}</strong>
        <span class="${s.status}">
            ${s.status==="ok"?"● Normal":s.status==="warn"?"● Atenção":"● Crítico"}
        </span>
    </div>

    <div class="metric">CPU ${s.cpu}%<div class="bar"><div class="fill cpu" style="width:${s.cpu}%"></div></div></div>
    <div class="metric">RAM ${s.ram}%<div class="bar"><div class="fill ram" style="width:${s.ram}%"></div></div></div>
    <div class="metric">Disco ${s.disk}%<div class="bar"><div class="fill disk" style="width:${s.disk}%"></div></div></div>
    <div class="metric">Rede ${s.net} Mbps<div class="bar"><div class="fill net" style="width:${Math.min(s.net/4,100)}%"></div></div></div>

    <div class="process">Processos: ${s.processos}</div>

    <div class="process">
        🔐 Segurança:
        <span class="${s.seguranca==="ok"?"sec-ok":"sec-bad"}">
            ${s.seguranca==="ok"?"Íntegra":"Comprometida"}
        </span>
    </div>

    <div class="process">
        🚨 Ameaças: ${s.ameacas}
    </div>
    `;

    document.getElementById("servers").appendChild(card);
});

// KPIs
document.getElementById("total").innerText=data.length;
document.getElementById("ok").innerText=ok;
document.getElementById("warn").innerText=warn;
document.getElementById("crit").innerText=crit;
document.getElementById("alert").innerText=alert;
document.getElementById("threats").innerText=threats;
</script>

</body>
</html>
