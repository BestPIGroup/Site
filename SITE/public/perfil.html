<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argos | Configurações de Conta</title>
    <link rel="stylesheet" href="./css/perfil.css">
    <link rel="icon" href="./assets/LogoArgos.png">
</head>

<body onload="exibir()">
    <header class="sidebar">
        <div class="logo">
            <img src="./assets/LogoArgosIcon.png" alt="Logo Argos">
        </div>
        <ul class="listaOpcoes">
            <li><a href="servidores.html"><img src="./assets/server2.png" alt="Servidores"></a></li>
            <li><a href="#"><img src="./assets/team.png" alt="Funcionários"></a></li>
            <li style="background-color: #0f1b2d;"><a href="perfil.html"><img src="./assets/user3.png" alt="Perfil"></a></li>
            <li class="saida"><a href="index.html" onclick="logout()"><img src="./assets/saida.png" alt="Sair"></a></li>
        </ul>
    </header>

    <div class="conteudo">
        <div class="box">
            <div class="retangulo">
                <p>Configurações de conta</p>
            </div>
        </div>

        <div class="container-config">
            <section class="card-config">
                <h3>Configurações de acesso</h3>
                <div class="formulario">
                    <div class="item-input">
                        <label>Email:</label>
                        <input type="text" id="email_usuario_input" placeholder="email@dominio.com">
                    </div>
                    <div class="item-input">
                        <label>Senha:</label>
                        <input type="password" id="senha_usuario_input" placeholder="********">
                    </div>
                    <div class="item-input">
                        <label>Código de unidade:</label>
                        <input type="text" id="cod_unidade_input" placeholder="A2ds/24*">
                    </div>
                    <button class="btn-confirmar">Confirmar mudanças</button>
                </div>
            </section>

            <section class="card-config">
                <h3>Configurações pessoais</h3>
                <div class="formulario-grid">
                    <div class="item-input">
                        <label>CPF:</label>
                        <input type="text" id="cpf_usuario_input" placeholder="xxx.xxx.xxx-xx">
                    </div>
                    <div class="item-input">
                        <label>RG:</label>
                        <input type="text" id="rg_usuario_input" placeholder="Jonas Ramalho">
                    </div>
                    <div class="item-input">
                        <label>Telefone:</label>
                        <input type="text" id="tel_usuario_input" placeholder="(11) 99999-9999">
                    </div>
                    <div class="item-confirmar-grid">
                        <label>Confirmar mudanças</label>
                        <button class="btn-confirmar">Confirmar mudanças</button>
                    </div>
                    <div class="item-input">
                        <label>Código de unidade:</label>
                        <input type="text" id="cod_unidade_pessoal" placeholder="A2ds/24*">
                    </div>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
