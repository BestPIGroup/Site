<script>


function carregarGraficos() {
    const data = [
        { nome: "Memória", valor: 12, status: "ok" },
        { nome: "CPU", valor: 88, status: "crit" },
        { nome: "Disco", valor: 55, status: "atencao" },
        { nome: "Rede", valor: 19, status: "ok" }
    ];

    const containerCampo = document.querySelector(".campo");
    containerCampo.innerHTML = ""; 

    data.forEach((c, index) => {
        const divGrafico = document.createElement("div");
        divGrafico.className = "grafico-container";
        
        divGrafico.style.width = "400px";
        divGrafico.style.height = "250px";
        divGrafico.style.backgroundColor = "#1c2e5a";
        divGrafico.style.borderRadius = "8px";
        divGrafico.style.padding = "10px";
        
        const canvasId = `canvas-${index}`;
        divGrafico.innerHTML = `<canvas id="${canvasId}"></canvas>`;
        containerCampo.appendChild(divGrafico);

        const ctx = document.getElementById(canvasId).getContext('2d');
        
        const corLinha = c.status === 'crit' ? '#ff3b3b' : c.status === 'atencao' ? '#927012' : '#12921C';

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['10:00', '10:05', '10:10', '10:15', '10:20'],
                datasets: [{
                    label: `Uso de ${c.nome} (%)`,
                    data: [c.valor - 8, c.valor + 4, c.valor - 2, c.valor - 5, c.valor],
                    borderColor: corLinha,
                    backgroundColor: 'rgba(255, 255, 255, 0.05)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    title: {
                        display: true,
                        text: `Histórico: ${c.nome}`,
                        color: '#fff'
                    }
                },
                scales: {
                    y: { 
                        min: 0, 
                        max: 100, 
                        ticks: { color: '#fff' },
                        grid: { color: 'rgba(255, 255, 255, 0.1)' }
                    },
                    x: { 
                        ticks: { color: '#fff' },
                        grid: { display: false }
                    }
                }
            }
        });
    });
}
